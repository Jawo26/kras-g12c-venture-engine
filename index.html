        .card-id { font-size: 13px; font-weight: 600; color: #38bdf8; background: rgba(56, 189, 248, 0.08); padding: 6px 12px; border-radius: 6px; }

        .score-lbl { font-size: 12px; color: #9ca3af; font-weight: 500; letter-spacing: 0.5px; }
        .score-val { font-size: 36px; font-weight: 700; }
        .score-high { color: #10b981; }
        .score-med { color: #f59e0b; }
        .score-low { color: #ef4444; }

        .metric-lbl { color: #9ca3af; }

        function getScoreClass(score) {
            if (!score) return 'score-low';
            if (score >= 75) return 'score-high';
            if (score >= 50) return 'score-med';
            return 'score-low';
        }

        function getPhaseClass(phase) {
            if (phase.includes('PHASE1')) return 'p1';
            if (phase.includes('PHASE2')) return 'p2';
            if (phase.includes('PHASE3')) return 'p3';
            return 'pns';
        }

        function renderCards(filteredData) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            filteredData.forEach(row => {
                const card = document.createElement('div');
                card.className = 'k-card';
                
                const scoreVal = row.Enterprise_TrustScore ? row.Enterprise_TrustScore.toFixed(1) : 'N/A';
                const scoreClass = getScoreClass(row.Enterprise_TrustScore);
                const phaseClass = getPhaseClass(row.Phase);
                
                card.innerHTML = `
                    <div class="card-top">
                        <span class="card-id">${row.NCTId}</span>
                        <span class="phase-badge ${phaseClass}">${row.Phase}</span>
                    </div>
                    <div class="score-section">
                        <span class="score-lbl">ENTERPRISE TRUST SCORE</span>
                        <span class="score-val ${scoreClass}">${scoreVal}</span>
                    </div>
                    <div class="metrics-list">
                        <div class="metric-row">
                            <span class="metric-lbl">Cohort Enrollment:</span>
                            <span class="metric-val">${row.EnrollmentCount || 'Unknown'} patients</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-lbl">Verification Footprint:</span>
                            <span class="metric-val" style="text-transform: uppercase;">${row.TrustScore_Confidence || 'n/a'}</span>
                        </div>
                    </div>
                    <div class="audit-trail">
                        ${row.Architect_Audit_Trail}
                    </div>
                `;
                container.appendChild(card);
            });
            document.getElementById('total-count').innerText = filteredData.length;
        }

        function filterCards() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = data.filter(row => 
                row.NCTId.toLowerCase().includes(query) || 
                row.Phase.toLowerCase().includes(query)
            );
            renderCards(filtered);
        }

        // Initial paint
        renderCards(data);
    </script>
